

<div class="favoris-client">
  <h2>Favoris <br> des Clients</h2>
  <div class="produits">
    <div class="product-card" *ngFor="let product of products; let i = index">
      <!-- Sticker "New" pour le 1er et le 3ème produit -->
      <div class="sticker" *ngIf="i === 0 || i === 2">New</div>

      <!-- Image du produit avec description en superposition -->
      <div class="image-container" 
           (mouseenter)="product.showDescription = true" 
           (mouseleave)="product.showDescription = false">
        <img [src]="product.image" [alt]="product.name" />
        <div class="description-overlay" *ngIf="product.showDescription">
          {{ product.description }}
        </div>
      </div>

      <!-- Nom du produit -->
      <h3>{{ product.name }}</h3>

      <!-- Prix, étoiles et possibilité de sélection -->
      <div class="price-info">
        <p class="price">{{ product.price }}</p>
        <!-- Étoiles d'avis -->
        <div class="rating">
          <span *ngFor="let star of stars; let starIndex = index" 
                [class.filled]="starIndex < product.rating" 
                (click)="rateProduct(product, starIndex + 1)">
            ★
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

    <div class="bg-gray-100 min-h-screen py-32 px-10">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 md:gap-x-10 xl:grid-cols-4 gap-y-10 gap-x-6"> 
      <div class="container mx-auto shadow-lg rounded-lg max-w-md hover:shadow-2xl transition duration-300" *ngFor="let item of galleryItems">
        <img [src]="item.image" alt="Image" class="rounded-t-lg w-full">
        <div class="p-6">
          <h1 class="md:text-1xl text-xl hover:text-indigo-600 transition duration-200 font-bold text-gray-900">{{ item.title }}</h1>
          <p class="text-gray-700 my-2">{{ item.description }}</p>
        </div>
      </div>
    </div>
  </div>
